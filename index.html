<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Americanisms</title>
  <!-- Times New Roman is a system font — no external load needed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── FOCUS STATES (WCAG 2.2 compliant) ──
       :focus-visible targets keyboard/assistive-tech navigation only — not mouse clicks.
       outline-offset: 2px creates the required gap between element and ring.
       2px solid #222 on white = 15.3:1 contrast ratio, well above the 3:1 minimum. */
    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Per-element radius overrides so the ring hugs the shape */
    button:focus-visible,
    .btn-primary:focus-visible,
    .btn-secondary:focus-visible,
    .btn-guess:focus-visible,
    .btn-primary:focus-visible,
    .btn-secondary:focus-visible {
      border-radius: 100px;
    }

    .guess-input:focus-visible {
      outline-offset: 4px;
      border-radius: 0;
    }

    .faq-question:focus-visible {
      border-radius: 4px;
    }

    .about-back:focus-visible {
      border-radius: 4px;
    }

    /* Card stack: large offset so the ring wraps the full fanned deck */
    .card-stack:focus-visible {
      outline-offset: 32px;
      border-radius: 16px;
    }

    /* Game logo: gentle corner radius instead of full pill */
    .game-logo:focus-visible {
      outline-offset: 4px;
      border-radius: 6px;
    }

    :root {
      /* Design system — Parker Simon */
      --bg:           #FFFFFF;  /* white */
      --card-bg:      #FFFFFF;
      --text-primary: #222222;  /* us.black */
      --text-secondary:#555550;
      --text-muted:   #CECABD;  /* us.gray.one */
      --ink:          #222222;  /* us.black */
      --blue:         #0263DE;  /* us.blue */
      --red:          #D70200;  /* us.red */
      --gold:         #B8923F;  /* us.gold */
      --gray-one:     #CECABD;  /* us.gray.one */
      --gray-two:     #A19E99;  /* us.gray.two */
      --success:      #0263DE;
      --error:        #D70200;
      --border:       #CECABD;  /* us.gray.one */
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.06);
      --shadow-md:    0 8px 32px rgba(0,0,0,0.09);
      --shadow-lg:    0 16px 48px rgba(0,0,0,0.12);
      --radius:       14px;
      --card-w:       313px;
      --card-h:       448px;
      --banner-h:     46px;
      --serif:        'Times New Roman', Times, Georgia, serif;
      --mono:         'IBM Plex Mono', monospace;
      --tracking:     -0.03em;
      --lh-body:      24px;  /* body.primary line-height */
    }

    html, body {
      height: 100%;
      font-family: var(--serif);
      line-height: var(--lh-body);
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── GOVERNMENT BANNER ── */
    #gov-banner {
      position: relative;
      background: #222222;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .banner-text {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      color: #fff;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    #app {
      min-height: 100vh;
      padding-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: 40px;
      transition: opacity 0.224s ease;
    }

    /* ── LANDING ── */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .landing-wordmark {
      font-family: var(--serif);
      font-size: clamp(56px, 12vw, 96px);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: var(--tracking);
      line-height: 1;
      margin-bottom: 22px;
    }

    .landing-tagline {
      font-family: var(--serif);
      font-size: 20px;
      line-height: 1.4;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      max-width: 560px;
      white-space: nowrap;
      margin: 0 auto 56px;
    }

    .card-stack {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      margin: 0 auto 56px;
      cursor: pointer;
    }

    .stack-card {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 16px;
      top: 0; left: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    .stack-card-back {
      background-color: var(--border);
      background-image:
        url('illustrations/americanisms-seal.png'),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px,
          transparent 0, transparent 5px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0,0,0,0.025) 0, rgba(0,0,0,0.025) 1px,
          transparent 0, transparent 5px
        );
      background-repeat: no-repeat, repeat, repeat;
      background-position: center, 0 0, 0 0;
      background-size: 62%, 5px 5px, 5px 5px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(0,0,0,0.09);
    }

    .stack-card-back::after {
      content: '';
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 10px;
    }

    .s4 { transform: rotate(-5deg) translate(-8px, 10px); z-index: 1; }
    .s3 { transform: rotate(-2.5deg) translate(-4px, 5px); z-index: 2; }
    .s2 { transform: rotate(2deg) translate(4px, 3px);  z-index: 3; }
    .s1 { transform: rotate(0.5deg) translate(0, 0);    z-index: 4; }

    .card-stack:hover .s4 { transform: rotate(-9deg) translate(-16px, 18px); }
    .card-stack:hover .s3 { transform: rotate(-4deg) translate(-8px, 10px); }
    .card-stack:hover .s2 { transform: rotate(4deg)  translate(8px, 6px); }
    .card-stack:hover .s1 { transform: rotate(1deg)  translate(2px, 0); }

    .card-stack:active .s4 { transform: rotate(-11deg) translate(-20px, 22px); }
    .card-stack:active .s3 { transform: rotate(-5deg)  translate(-10px, 12px); }
    .card-stack:active .s2 { transform: rotate(5deg)   translate(10px, 8px); }
    .card-stack:active .s1 { transform: rotate(1.5deg) translate(3px, 1px); }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--ink);
      color: #fff;
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      padding: 12px 24px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      letter-spacing: -0.02em;
      white-space: nowrap;
      transition: transform 0.08s ease;
    }
    .btn-primary:active { transform: scale(0.97); }

    /* ── GAME SCREEN ── */
    .game-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 48px;
    }

    .game-logo {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: var(--tracking);
      transition: opacity 0.15s ease;
      background: none; border: none; padding: 0; cursor: pointer;
    }
    .game-logo:hover { opacity: 0.5; }

    .game-meta { display: flex; gap: 16px; align-items: center; }
    .progress-text { font-family: var(--serif); font-size: 16px; color: var(--text-primary); letter-spacing: -0.02em; }
    .score-badge {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 400;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      padding: 4px 8px;
      border-radius: 100px;
      letter-spacing: -0.02em;
      white-space: nowrap;
      line-height: normal;
    }

    /* Card stage — holds peek stack + active card */
    .card-stage {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      margin-bottom: 56px;
      flex-shrink: 0;
    }

    /* Peek cards — white face-up, matching the active card aesthetic */
    .peek-card {
      position: absolute;
      top: 0; left: 0;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow:
        0px 6px 12px rgba(0,0,0,0.07),
        0px 22px 22px rgba(0,0,0,0.05);
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      padding: 10px;
    }

    .peek-card::after {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(34,34,34,0.10);
      border-radius: 12px;
    }

    .peek-1 { transform: rotate(-2.5deg) translate(-7px, 7px); z-index: 1; }
    .peek-2 { transform: rotate(-4.5deg) translate(-13px, 13px); z-index: 0; }

    .play-card {
      position: absolute;
      top: 0; left: 0;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 16px;
      background: #fff;
      box-shadow:
        0px 6px 12px rgba(0,0,0,0.10),
        0px 22px 22px rgba(0,0,0,0.09),
        0px 50px 30px rgba(0,0,0,0.05),
        0px 88px 35px rgba(0,0,0,0.01);
      border: 1px solid var(--border);
      padding: 10px;
      z-index: 2;
    }

    .play-card.shake { animation: shake 0.45s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px) rotate(-0.5deg); }
      40% { transform: translateX(7px) rotate(0.5deg); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Card rises up from the stack on entry.
       `both` is critical — applies the 0% keyframe BEFORE the animation starts,
       preventing a single-frame flash at full opacity. */
    .card-rise {
      animation: cardRise 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
      will-change: transform, opacity;
    }

    @keyframes cardRise {
      0%   { transform: rotate(-2.5deg) translate(-7px, 10px) scale(0.95); opacity: 0; }
      35%  { opacity: 1; }
      68%  { transform: rotate(0.6deg) translate(1px, -3px) scale(1.018); }
      84%  { transform: rotate(-0.15deg) translate(-0.5px, 0.5px) scale(0.999); }
      100% { transform: rotate(0deg) translate(0, 0) scale(1); opacity: 1; }
    }

    /* Card fades out when dismissed */
    .card-fade-out {
      animation: cardFadeOut 0.26s cubic-bezier(0.4, 0, 1, 1) both;
      pointer-events: none;
      will-change: transform, opacity;
    }

    @keyframes cardFadeOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.97); }
    }

    /* Overlay fade out — opacity only, no backdrop-filter animation (causes flash) */
    .reveal-overlay.dismissing {
      animation: overlayOut 0.38s ease both;
      pointer-events: none;
    }

    @keyframes overlayOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* Inner card frame */
    .card-inner {
      width: 100%; height: 100%;
      border: 1px solid rgba(34,34,34,0.13);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 32px 20px;
      overflow: hidden;
    }

    .card-illustration {
      flex: 1;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .card-illustration img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-illustration .placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
    }

    .placeholder-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.35;
    }

    .attempt-dots { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.2s ease; }
    .dot.used { background: var(--ink); }

    .guess-area { width: 100%; display: flex; flex-direction: column; align-items: center; }

    /* Input + Guess button row — button sits alongside the input+feedback group */
    .guess-input-row {
      display: flex;
      width: auto;
      gap: 12px;
      align-items: flex-start;
    }

    /* Input and its helper text stacked — keeps feedback left-aligned under the field */
    .guess-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .guess-input {
      flex: none;
      width: 256px;
      font-family: var(--serif);
      font-size: 20px;
      letter-spacing: -0.02em;
      padding: 4px;
      height: 48px;
      border: none;
      border-bottom: 1px solid var(--gray-two);
      border-radius: 0;
      background: #fff;
      color: var(--text-primary);
      outline: none;
      overflow: hidden;
      transition: border-color 0.32s ease;
    }

    .guess-input:focus { border-color: var(--ink); }
    .guess-input.row-error { border-color: var(--red); }
    .guess-input::placeholder { color: var(--gray-two); }

    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .feedback-msg {
      font-family: var(--serif);
      font-size: 16px;
      letter-spacing: -0.02em;
      color: transparent;
      min-height: 20px;
      padding: 0 4px;
      text-align: left;
      width: 256px;
      transition: color 0.18s ease;
    }
    .feedback-msg.error { color: var(--red); }

    /* ── REVEAL OVERLAY ── */
    .reveal-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(6.5px);
      -webkit-backdrop-filter: blur(6.5px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; z-index: 100;
      animation: fadeIn 0.25s ease both;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .reveal-content {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      max-width: 431px; width: 100%;
      animation: revealRise 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes revealRise {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .reveal-status {
      font-family: var(--serif);
      font-size: 20px; font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .reveal-idiom {
      font-family: var(--serif);
      font-size: clamp(44px, 9vw, 64px); font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--ink); line-height: 1;
      margin-bottom: 16px;
    }

    .reveal-category-pill {
      display: inline-flex; align-items: center;
      border: 0.5px solid var(--ink);
      border-radius: 100px;
      padding: 4px 8px;
      font-family: var(--serif);
      font-size: 12px; font-weight: 400; line-height: 1;
      letter-spacing: -0.02em; text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .reveal-insight {
      font-family: var(--serif);
      font-size: 20px; line-height: var(--lh-body);
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 40px;
      max-width: 431px;
    }


    /* ── ABOUT PAGE ── */
    .about-screen {
      width: 100%;
      max-width: 700px;
      padding: 48px 24px 120px;
      display: flex;
      flex-direction: column;
      gap: 64px;
    }

    .about-back {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      gap: 6px;
      transition: none;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
      text-decoration-color: currentColor;
    }
    .about-back:hover { color: var(--gray-two); }

    .about-section { display: flex; flex-direction: column; gap: 40px; }

    .about-title {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .about-body {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: var(--lh-body);
    }

    .about-divider { width: 100%; height: 0.5px; background: var(--border); }

    .faq-list { display: flex; flex-direction: column; gap: 40px; }

    .faq-item { display: flex; flex-direction: column; }

    .faq-question {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      cursor: pointer;
    }

    .faq-question-text {
      font-family: var(--serif);
      font-size: clamp(22px, 3.5vw, 32px);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .faq-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      font-size: 28px;
      color: var(--ink);
      line-height: 1;
      transition: transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .faq-icon.open {
      transform: rotate(45deg);
    }

    .faq-answer {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: var(--lh-body);
      padding-top: 16px;
      overflow: hidden;
      height: 0;
      opacity: 0;
      transition: height 0.42s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .faq-answer ul { padding-left: 24px; margin: 0; }
    .faq-answer li { margin-bottom: 4px; }

    .landing-actions { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.02em;
      padding: 12px 24px;
      border-radius: 100px;
      border: 1px solid var(--ink);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.08s ease;
    }
    .btn-secondary:active { transform: scale(0.97); }

    /* ── END SCREEN ── */
    .end-screen {
      max-width: 560px; width: 100%;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
      position: relative; z-index: 1;
    }

    #confetti-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* Score section */
    .end-score-section {
      text-align: center;
      margin-bottom: 52px;
    }

    .end-score-label {
      font-family: var(--serif);
      font-size: 20px; font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .end-score-number {
      font-family: var(--serif);
      font-size: 96px; font-weight: 400;
      letter-spacing: -0.03em;
      color: var(--ink); line-height: 1;
      margin-bottom: 14px;
      display: flex; align-items: baseline;
      justify-content: center;
    }

    .end-digit-slot {
      display: inline-block;
      position: relative;
      overflow: visible;
    }

    .end-score-denom {
      font-family: var(--serif);
      font-size: 96px; font-weight: 400;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    @keyframes btnSlideUp {
      from { opacity: 0; filter: blur(4px); transform: translateY(4px); }
      to   { opacity: 1; filter: blur(0px); transform: translateY(0); }
    }
    .btn-slide-up { animation: btnSlideUp 0.64s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes btnSlideDown {
      from { opacity: 0; filter: blur(4px); transform: translateY(-4px); }
      to   { opacity: 1; filter: blur(0px); transform: translateY(0); }
    }
    .btn-slide-down { animation: btnSlideDown 0.64s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes btnExitUp {
      from { opacity: 1; filter: blur(0px); transform: translateY(0); }
      to   { opacity: 0; filter: blur(4px); transform: translateY(-4px); }
    }
    .btn-exit-up { animation: btnExitUp 0.64s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes btnExitDown {
      from { opacity: 1; filter: blur(0px); transform: translateY(0); }
      to   { opacity: 0; filter: blur(4px); transform: translateY(4px); }
    }
    .btn-exit-down { animation: btnExitDown 0.64s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes digitRoll {

// ── UTILS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return s.toLowerCase().replace(/[''`]/g,"'").replace(/[^a-z0-9\s']/g,'').replace(/\s+/g,' ').trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
  return dp[m][n];
}

function isCorrect(guess, answer) {
  const g = normalize(guess), a = normalize(answer);
  if (!g) return false;
  if (g === a) return true;
  const maxDist = Math.max(2, Math.floor(a.length * 0.2));
  if (levenshtein(g, a) <= maxDist) return true;
  const strip = s => s.replace(/^(the|a|an) /, '');
  if (levenshtein(strip(g), strip(a)) <= maxDist) return true;
  const stops = new Set(['the','and','but','for','that','with','your','have','this','from','they','will']);
  const keys = a.split(' ').filter(w => w.length > 3 && !stops.has(w));
  if (keys.length >= 2 && keys.every(w => g.includes(w))) return true;
  return false;
}

const FW_COLORS = ['#D70200', '#0263DE'];
let fwRockets = [], fwParticles = [], fwFlashes = [], fwTimers = [], fwRunning = false;
let fwCanvas = null, fwCtx = null;

function fwInit() {
  if (fwCanvas) return;
  fwCanvas = document.createElement('canvas');
  fwCanvas.id = 'confetti-canvas'; // reuse existing CSS (position:fixed, pointer-events:none)
  document.body.appendChild(fwCanvas);
  fwCtx = fwCanvas.getContext('2d');
  fwCanvas.width  = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}

function fwMakeRocket(xFraction) {
  return {
    x: fwCanvas.width * xFraction,
    y: fwCanvas.height,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -(13 + Math.random() * 4),
    trail: [], exploded: false,
  };
}

function fwBurst(x, y) {
  const count = 120 + Math.floor(Math.random() * 30);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.3;
    const speed = 2 + Math.random() * 7;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)],
      alpha: 1, drag: 0.965, gravity: 0.07,
      w: 1.5 + Math.random() * 2,
      h: 3.5 + Math.random() * 5,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.3,
    });
  }
}

function fwTick() {
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);

  // Rockets
  for (let i = fwRockets.length - 1; i >= 0; i--) {
    const r = fwRockets[i];
    if (r.exploded) { fwRockets.splice(i, 1); continue; }
    r.trail.unshift({ x: r.x, y: r.y });
    if (r.trail.length > 12) r.trail.pop();
    r.x += r.vx; r.y += r.vy; r.vy += 0.18;
    r.trail.forEach((pt, idx) => {
      const t = 1 - idx / r.trail.length;
      fwCtx.beginPath();
      fwCtx.arc(pt.x, pt.y, 2.5 * t, 0, Math.PI * 2);
      fwCtx.fillStyle = `rgba(255, 210, 80, ${t * 0.85})`;
      fwCtx.fill();
    });
    if (r.vy >= -1.5) {
      r.exploded = true;
      fwBurst(r.x, r.y);
      fwFlashes.push({ x: r.x, y: r.y, radius: 2, alpha: 1 });
    }
  }

  // Pop flashes — normal blend so they stay white
  for (let i = fwFlashes.length - 1; i >= 0; i--) {
    const f = fwFlashes[i];
    f.radius += 6; f.alpha *= 0.78;
    if (f.alpha < 0.02) { fwFlashes.splice(i, 1); continue; }
    fwCtx.beginPath();
    fwCtx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
    fwCtx.globalAlpha = f.alpha;
    fwCtx.fillStyle = '#ffffff';
    fwCtx.fill();
  }
  fwCtx.globalAlpha = 1;

  // Particles — additive blending for glow
  fwCtx.globalCompositeOperation = 'lighter';
  for (let i = fwParticles.length - 1; i >= 0; i--) {
    const p = fwParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= p.drag; p.vy = p.vy * p.drag + p.gravity;
    p.alpha *= 0.982; p.rot += p.rotV;
    if (p.alpha < 0.015) { fwParticles.splice(i, 1); continue; }
    fwCtx.save();
    fwCtx.translate(p.x, p.y);
    fwCtx.rotate(p.rot);
    fwCtx.globalAlpha = p.alpha;
    fwCtx.fillStyle = p.color;
    fwCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    fwCtx.restore();
  }
  fwCtx.globalCompositeOperation = 'source-over';
  fwCtx.globalAlpha = 1;

  if (fwRockets.length > 0 || fwParticles.length > 0 || fwFlashes.length > 0) {
    requestAnimationFrame(fwTick);
  } else {
    fwRunning = false;
    if (fwCanvas) { fwCanvas.remove(); fwCanvas = null; fwCtx = null; }
  }
}

function launchFireworks() {
  fwTimers.forEach(clearTimeout);
  fwRockets = []; fwParticles = []; fwFlashes = []; fwTimers = [];
  if (fwCanvas) { fwCanvas.remove(); fwCanvas = null; fwCtx = null; }
  fwInit();

  const positions = [0.2, 0.38, 0.55, 0.72, 0.85];
  positions.sort(() => Math.random() - 0.5);
  positions.forEach((x, i) => {
    fwTimers.push(setTimeout(() => {
      fwRockets.push(fwMakeRocket(x));
      if (!fwRunning) { fwRunning = true; fwTick(); }
    }, i * 480));
  });
}

// ── PEEK STACK ──
function peekHTML(index) {
  const remaining = 8 - index - 1; // cards left after current
  const peeks = Math.min(remaining, 2);
  let html = '';
  if (peeks >= 2) html += '<div class="peek-card peek-2"></div>';
  if (peeks >= 1) html += '<div class="peek-card peek-1"></div>';
  return html;
}

// ── ILLUSTRATIONS ──
function illustrationHTML(card) {
  return `<img src="illustrations/${card.filename}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
  <div class="placeholder ${CAT_CLASS[card.category]||'cat-animal'}" style="display:none;">
    <span class="placeholder-label">${card.category}</span>
  </div>`;
}

function dotsHTML(used) {
  return [0,1,2].map(i => {
    let c = 'dot';
    if (i < used) c += ' used';
    return `<span class="${c}"></span>`;
  }).join('');
}

function toggleFaq(el) {
  const answer = el.nextElementSibling;
  const icon = el.querySelector('.faq-icon');
  const isOpen = answer.style.height && answer.style.height !== '0px';

  if (isOpen) {
    // Collapse: pin current height, then animate to 0
    answer.style.height = answer.scrollHeight + 'px';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        answer.style.height = '0px';
        answer.style.opacity = '0';
      });
    });
    icon.classList.remove('open');
    el.setAttribute('aria-expanded', 'false');
  } else {
    // Expand: measure natural height, animate to it
    answer.style.height = '0px';
    answer.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        answer.style.height = answer.scrollHeight + 'px';
        answer.style.opacity = '1';
      });
    });
    icon.classList.add('open');
    el.setAttribute('aria-expanded', 'true');
  }
}

          : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M17 7L7 17M7 7L17 17" stroke="#CECABD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`

          Challenge a friend
        </button>
        <button class="btn-secondary" onclick="startGame()">Play again</button>
      </div>
    </div>
  `;

  if (score >= 4 && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) launchFireworks();

  // ── Score count-up animation ──
  const digitEl = document.getElementById('end-digit');
  const taglineEl = document.getElementById('end-tagline');

  function getCountDelay(step, total) {
    const t = step / total;
    const eased = t * t;
    return 80 + eased * (340 - 80);
  }

  function rollDigit(el, value, isFinal) {
    el.innerHTML = '';
    const span = document.createElement('span');
    span.className = isFinal ? 'digit-roll-final' : 'digit-roll';
    span.textContent = value;
    el.appendChild(span);
  }

  if (score === 0) {
    rollDigit(digitEl, 0, true);
    setTimeout(() => taglineEl.classList.add('visible'), 420);
  } else {
    let current = 0;
    rollDigit(digitEl, 0, false);
    const tick = () => {
      current++;
      const isFinal = current === score;
      rollDigit(digitEl, current, isFinal);
      if (!isFinal) {
        setTimeout(tick, getCountDelay(current, score));
      } else {
        setTimeout(() => taglineEl.classList.add('visible'), 420);
      }
    };
    setTimeout(tick, getCountDelay(0, score));
  }
}

// ── ACTIONS ──
function startGame() {
  const rest = shuffle(IDIOMS.filter(c => c.filename !== 'bite-the-bullet.png')).slice(0, 7);
  const preview = IDIOMS.find(c => c.filename === 'bite-the-bullet.png');
  session = preview ? [preview, ...rest] : rest;
  currentIndex = 0; attempts = 0; score = 0; results = [];
  phase = 'playing';
  fadeTransition(() => renderGame());
}

function submitGuess() {
  if (phase !== 'playing') return;
  const input = document.getElementById('guess-input');
  const guess = input.value.trim();
  if (!guess) {
    const fb = document.getElementById('feedback');
    fb.textContent = 'Type a guess first';
    fb.className = 'feedback-msg error';
    input.classList.add('row-error');
    input.focus();
    input.addEventListener('input', () => {
      fb.className = 'feedback-msg';
      fb.textContent = '';
      input.classList.remove('row-error');
    }, { once: true });
    return;
  }

  const card = session[currentIndex];
  attempts++;

  if (isCorrect(guess, card.idiom)) {
    score++;
    results.push({ idiom: card.idiom, category: card.category, correct: true });
    const dotsEl1 = document.getElementById('dots');
    dotsEl1.innerHTML = dotsHTML(attempts);
    dotsEl1.setAttribute('aria-label', `${attempts} of 3 attempts used`);
    phase = 'reveal';
    setTimeout(() => renderReveal(true), 200);
  } else if (attempts >= 3) {
    results.push({ idiom: card.idiom, category: card.category, correct: false });
    const dotsEl2 = document.getElementById('dots');
    dotsEl2.innerHTML = dotsHTML(attempts);
    dotsEl2.setAttribute('aria-label', `${attempts} of 3 attempts used`);
    const pcFinal = document.getElementById('play-card');
    pcFinal.classList.remove('card-rise');
    pcFinal.classList.add('shake');
    phase = 'reveal';
    setTimeout(() => renderReveal(false), 500);
  } else {
    const remaining = 3 - attempts;
    const fb = document.getElementById('feedback');
    fb.textContent = `Not quite — ${remaining} ${remaining===1?'guess':'guesses'} left`;
    fb.className = 'feedback-msg error';
    document.getElementById('guess-input')?.classList.add('row-error');
    const pc = document.getElementById('play-card');
    pc.classList.remove('card-rise'); // prevent restart when shake ends
    pc.classList.add('shake');
    pc.addEventListener('animationend', () => pc.classList.remove('shake'), {once:true});
    const dotsEl3 = document.getElementById('dots');
    dotsEl3.innerHTML = dotsHTML(attempts);
    dotsEl3.setAttribute('aria-label', `${attempts} of 3 attempts used`);
    input.value = '';
    input.focus();
    // Clear helper text as soon as the user starts typing again
    input.addEventListener('input', () => {
      fb.className = 'feedback-msg';
      fb.textContent = '';
      input.classList.remove('row-error');
    }, { once: true });
  }
}

function nextCard() {
  const overlay = document.querySelector('.reveal-overlay');

  const throwAndAdvance = () => {
    const activeCard = document.getElementById('play-card');
    if (activeCard) {
      activeCard.classList.add('card-fade-out');
      setTimeout(() => {
        currentIndex++;
        attempts = 0;
        if (currentIndex >= 8) { phase = 'end'; fadeTransition(() => renderEnd()); }
        else { phase = 'playing'; renderGame(); }
      }, 240);
    } else {
      currentIndex++;
      attempts = 0;
      if (currentIndex >= 8) { phase = 'end'; fadeTransition(() => renderEnd()); }
      else { phase = 'playing'; renderGame(); }
    }
  };

  if (overlay) {
    // Fade the overlay out gracefully, then throw the card
    overlay.classList.add('dismissing');
    setTimeout(() => {
      overlay.remove();
      throwAndAdvance();
    }, 360);
  } else {
    throwAndAdvance();
  }
}

function goHome() {
  phase = 'landing';

}

    exitEl.innerHTML = btn.innerHTML;

    // Set entering content
    btn.innerHTML = `<span class="${enterClass}" style="display:inline-flex;align-items:center;animation-duration:${duration};">${enterHTML}</span>`;
    exitEl.style.animationDuration = duration;
    btn.appendChild(exitEl);

    // Measure natural width including padding by briefly releasing the constraint
    btn.style.width = 'max-content';
    const newW = btn.offsetWidth;
    btn.style.width = oldW + 'px';
    void btn.offsetWidth;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      btn.style.transition = 'width 0.35s cubic-bezier(0.22, 1, 0.36, 1)';
      btn.style.width = newW + 'px';
    }));

    exitEl.addEventListener('animationend', () => exitEl.remove(), { once: true });
  };
  const showFeedback = () => {
    const btn = document.querySelector('.end-actions .btn-primary');
    if (!btn) return;
    const original = btn.innerHTML;
    swapBtn(btn, `${checkSVG}Copied to clipboard`, 'btn-slide-up', 'btn-exit-down');
    setTimeout(() => swapBtn(btn, original, 'btn-slide-down', 'btn-exit-up'), 2000);
  };

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showFeedback).catch(() => showFeedback());
  } else {
    // Fallback for http / older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showFeedback();
  }
}

// ── DEBUG SHORTCUT: Shift+R → jump straight to results screen ──
document.addEventListener('keydown', e => {
  if (e.shiftKey && e.key === 'R') {
    const sample = IDIOMS.slice(0, 8);
    results = sample.map((id, i) => ({ idiom: id.idiom, category: id.category, correct: i % 3 !== 2 }));
    score = results.filter(r => r.correct).length;
    phase = 'end';
    fadeTransition(() => renderEnd());
  }
});

// ── INIT ──
renderLanding();
</script>
